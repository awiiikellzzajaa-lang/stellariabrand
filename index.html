<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sakeera Bamboo</title>
    <style>
        /* --- RESET & DASAR --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* Menggunakan tema gradasi gelap hijau alam seperti pada Hero Section kamu */
            background: linear-gradient(rgba(46, 90, 46, 0.85), rgba(20, 40, 20, 0.95)), 
                        url('https://images.unsplash.com/photo-1505881502353-a1986add3762?auto=format&fit=crop&q=80&w=1920') center/cover no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* --- KARTU LOGIN --- */
        .login-container {
            background-color: rgba(255, 255, 255, 0.95); /* Putih bersih agak transparan */
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        /* --- LOGO DI DALAM LOGIN --- */
        .login-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-size: 26px;
            font-weight: bold;
            color: #2e5a2e; /* Hijau Tua STELLARIA */
            margin-bottom: 10px;
        }

        .login-logo span {
            color: #8da15f; /* Hijau Muda STELLARIA */
        }

        .login-logo img {
            width: 40px;
            height: auto;
            object-fit: contain;
        }

        .login-container p {
            color: #667c66;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* --- FORM INPUT --- */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #2e5a2e;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #c2dec2;
            border-radius: 10px;
            font-size: 1rem;
            color: #2c3e2c;
            background-color: #f9fbf9;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #8da15f;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(141, 161, 95, 0.2);
        }

        /* --- TOMBOL LOGIN --- */
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #8da15f; /* Warna hijau tombol "Lihat Produk" di gambar kamu */
            color: white;
            border: none;
            border-radius: 25px; /* Bulat lonjong senada dengan tombol di gambar */
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(141, 161, 95, 0.3);
        }

        .btn-login:hover {
            background-color: #728549;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(141, 161, 95, 0.4);
        }

        /* --- LINK TAMBAHAN --- */
        .login-footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #667c66;
        }

        .login-footer a {
            color: #2e5a2e;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .login-footer a:hover {
            color: #8da15f;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">
            <img src="logo.jpg" alt="💡"> 
            STELLARIA<span>.</span>
        </div>
        <p>Selamat datang kembali! Silakan masuk ke akun Anda.</p>

        <form>
            <div class="form-group">
                <label for="username">Nama Pengguna</label>
                <input type="text" id="username" placeholder="Masukkan username" required>
            </div>

            <div class="form-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" placeholder="Masukkan kata sandi" required>
            </div>
            
            <a href="beranda.html" style="text-decoration: none; display: block; width: 100%;">
    <button type="button" class="btn-login">Masuk Aplikasi</button>
</a>

            
        </form>
    </div>

</body>
</html>
